<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSports INPLAY — Back Office</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#aaee38;--lime-a:rgba(170,238,56,.13);--lime-b:rgba(170,238,56,.28);
  --gold:#ffd700;--gold-a:rgba(255,215,0,.13);
  --bg:#07070f;--card:#0e0e22;--border:#1c1c3a;
  --text:#fff;--muted:#6868a0;--warn:#ffaa00;--red:#ff4455;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(170,238,56,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(170,238,56,.02) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}

/* ── HEADER ── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 24px;border-bottom:1px solid var(--border);position:relative;z-index:1;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{color:var(--lime)}
.page-title{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.page-name{font-size:18px;font-weight:900;letter-spacing:-.3px}
.page-name em{font-style:normal;color:var(--lime)}
.nav-links{display:flex;gap:8px;flex-wrap:wrap}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 16px;
  color:var(--muted);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  transition:all .2s}
.nav-btn:hover{border-color:var(--lime);color:var(--lime)}
.nav-btn.active{border-color:var(--lime);color:var(--lime);background:var(--lime-a)}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);
  position:relative;z-index:1;flex-wrap:wrap;align-items:center}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;display:flex;flex-direction:column;align-items:center;min-width:90px}
.stat-chip-val{font-size:26px;font-weight:900;color:var(--lime);letter-spacing:-1px;line-height:1}
.stat-chip-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:blink 1.5s ease-in-out infinite;display:inline-block;margin-right:4px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.refresh-note{font-size:11px;color:var(--muted);margin-left:auto}

/* ── SECTION ── */
.section{padding:20px 24px;position:relative;z-index:1}
.section-title{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--lime);
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── BETS TABLE ── */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--card)}
table{width:100%;border-collapse:collapse;min-width:900px;font-size:12px}
thead th{padding:10px 12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);font-weight:700;text-align:left;border-bottom:1px solid var(--border);
  white-space:nowrap;position:sticky;top:0;background:var(--card)}
thead th:first-child{width:36px;text-align:center}
tbody tr{transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:9px 12px;vertical-align:middle}
tbody td:first-child{text-align:center;color:var(--muted);font-size:10px;font-weight:700}
.td-name{font-weight:700;font-size:13px;white-space:nowrap}
.td-time{color:var(--muted);font-size:10px;white-space:nowrap}
.td-ans{white-space:nowrap}
.ans-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;
  background:rgba(170,238,56,.1);color:var(--lime);border:1px solid rgba(170,238,56,.2)}
.ans-pill.correct{background:rgba(255,215,0,.15);color:var(--gold);border-color:rgba(255,215,0,.35)}
.ans-pill.wrong{background:rgba(255,255,255,.04);color:var(--muted);border-color:rgba(255,255,255,.08)}
.td-score{font-size:18px;font-weight:900;color:var(--lime);text-align:center;white-space:nowrap}
.td-score.top{color:var(--gold)}
.empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* ── RESULTS ENTRY ── */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:18px}
.res-q{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:13px}
.res-q-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px}
.res-select{width:100%;background:#111128;border:1.5px solid var(--border);border-radius:8px;
  padding:8px 11px;color:#fff;font-size:12px;font-family:inherit;outline:none;cursor:pointer;
  -webkit-appearance:none;appearance:none;transition:border-color .2s}
.res-select:focus{border-color:var(--lime)}
.res-select option{background:#111128}
.save-btn{background:var(--lime);color:#07070f;border:none;border-radius:10px;padding:12px 28px;
  font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;text-transform:uppercase;
  letter-spacing:.5px;transition:all .2s}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(170,238,56,.3)}

/* ── LEADERBOARD ── */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;display:flex;align-items:center;gap:13px;transition:all .3s}
.lb-card.p1{border-color:var(--gold);background:var(--gold-a)}
.lb-card.p2{border-color:rgba(192,192,192,.4);background:rgba(192,192,192,.05)}
.lb-card.p3{border-color:rgba(205,127,50,.4);background:rgba(205,127,50,.05)}
.lb-rank{font-size:26px;font-weight:900;min-width:38px;text-align:center}
.lb-rank.p1{color:var(--gold)}.lb-rank.p2{color:#c0c0c0}.lb-rank.p3{color:#cd7f32}
.lb-name{font-size:13px;font-weight:700;flex:1}
.lb-score{font-size:20px;font-weight:900;color:var(--lime)}
.lb-pts-lbl{font-size:9px;color:var(--muted)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:0 24px}
</style>
</head>

<script>
const META = {
  q1: {text:'Match Winner',       short:'Winner',   o:{home:'England',draw:'Draw',away:'Congo'}},
  q2: {text:'First Scorer',       short:'1st Goal', o:{home:'England',away:'Congo',none:'No Goals'}},
  q3: {text:'Half-Time Result',   short:'HT',       o:{home:'ENG Lead',draw:'Draw',away:'CON Lead'}},
  q4: {text:'Total Goals',        short:'Goals',    o:{'0-1':'0–1','2-3':'2–3','4-5':'4–5','6+':'6+'}},
  q5: {text:'Goal < 15 min',      short:'<15min',   o:{yes:'Yes',no:'No'}},
  q6: {text:'Both Teams Score',   short:'BTS',      o:{yes:'Yes',no:'No'}},
  q7: {text:'Red Card',           short:'Red Card', o:{yes:'Yes',no:'No'}},
  q8: {text:'Penalty',            short:'Penalty',  o:{yes:'Yes',no:'No'}},
  q9: {text:'More Goals Half',    short:'Top Half', o:{first:'1st',equal:'Equal',second:'2nd'}},
  q10:{text:'Total Corners',      short:'Corners',  o:{under8:'<8','8-12':'8–12',over12:'>12'}}
};

let allBets = [], results = {};

function fmt(ms){
  const d=new Date(ms);
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function buildHead(){
  const qs = Object.keys(META);
  const hasResults = Object.keys(results).length > 0;
  document.getElementById('bets-thead').innerHTML = `<tr>
    <th>#</th>
    <th>Name</th>
    <th>Time</th>
    ${qs.map(q=>`<th>${META[q].short}</th>`).join('')}
    ${hasResults ? '<th style="text-align:center">Score</th>' : ''}
  </tr>`;
}

function buildBody(){
  const qs = Object.keys(META);
  const hasResults = Object.keys(results).length > 0;
  if(!allBets.length){
    document.getElementById('bets-tbody').innerHTML=`<tr><td colspan="13" class="empty-msg">No bets yet — waiting for players...</td></tr>`;
    return;
  }
  const scored = allBets.map(b=>{
    const pts = hasResults ? qs.filter(q=>b[q]&&results[q]&&b[q]===results[q]).length : null;
    return {...b, pts};
  });
  if(hasResults) scored.sort((a,b)=>b.pts-a.pts||(a.ts||0)-(b.ts||0));
  const topScore = hasResults ? Math.max(...scored.map(b=>b.pts)) : null;

  document.getElementById('bets-tbody').innerHTML = scored.map((b,i)=>{
    const ansHtml = qs.map(q=>{
      const val = b[q];
      const label = META[q].o[val] || val || '—';
      let cls = 'ans-pill';
      if(hasResults && results[q]){
        cls += val===results[q] ? ' correct' : ' wrong';
      }
      return `<td class="td-ans"><span class="${cls}">${escHtml(label)}</span></td>`;
    }).join('');
    const scoreHtml = hasResults
      ? `<td class="td-score${b.pts===topScore&&topScore>0?' top':''}">${b.pts}<span style="font-size:10px;color:var(--muted);font-weight:600"> pts</span></td>`
      : '';
    return `<tr>
      <td>${i+1}</td>
      <td><div class="td-name">${escHtml(b.name||'Anon')}</div></td>
      <td><div class="td-time">${b.ts?fmt(b.ts):''}</div></td>
      ${ansHtml}
      ${scoreHtml}
    </tr>`;
  }).join('');
}

function buildResultsGrid(){
  document.getElementById('results-grid').innerHTML = Object.entries(META).map(([q,m])=>{
    const opts = Object.entries(m.o).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
    const cur = results[q]||'';
    return `<div class="res-q">
      <div class="res-q-lbl">${m.text}</div>
      <select class="res-select" id="ar-${q}">
        <option value="">— not set —</option>
        ${opts}
      </select>
    </div>`;
  }).join('');
  Object.entries(results).forEach(([q,v])=>{
    const el=document.getElementById('ar-'+q);if(el)el.value=v;
  });
}

function buildLeaderboard(){
  if(!Object.keys(results).length) return;
  const qs = Object.keys(META);
  const scored = allBets.map(b=>({
    name:b.name||'Anonymous',
    pts:qs.filter(q=>b[q]&&results[q]&&b[q]===results[q]).length,
    ts:b.ts||0
  }));
  scored.sort((a,b)=>b.pts-a.pts||a.ts-b.ts);
  const medals=['🥇','🥈','🥉'];
  const rankCls=['p1','p2','p3'];
  document.getElementById('lb-grid').innerHTML = scored.map((p,i)=>{
    const c=i<3?rankCls[i]:'';
    const r=i<3?medals[i]:`#${i+1}`;
    return `<div class="lb-card ${c}">
      <div class="lb-rank ${i<3?rankCls[i]:''}">${r}</div>
      <div class="lb-name">${escHtml(p.name)}</div>
      <div style="text-align:center"><div class="lb-score">${p.pts}</div><div class="lb-pts-lbl">pts</div></div>
    </div>`;
  }).join('');
  document.getElementById('lb-section').style.display='block';
  document.getElementById('top-score').textContent = scored[0]?.pts ?? '—';
}

function refreshAll(){
  const rCount = Object.keys(results).length;
  document.getElementById('total-count').textContent = allBets.length;
  document.getElementById('results-set').textContent = rCount+'/10';
  buildHead();
  buildBody();
  buildResultsGrid();
  if(rCount) buildLeaderboard();
}

async function saveResults(){
  const r={};
  Object.keys(META).forEach(q=>{
    const v=document.getElementById('ar-'+q)?.value;
    if(v) r[q]=v;
  });
  try{
    await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)});
    results=r;
    refreshAll();
    document.getElementById('lb-section').scrollIntoView({behavior:'smooth'});
  }catch(e){alert('Error: '+e.message);}
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Load data
fetch('/api/bets').then(r=>r.json()).then(d=>{
  allBets=d.bets||[]; results=d.results||{};
  refreshAll();
}).catch(()=>console.warn('Server not reachable'));

// SSE for live updates
const evtSrc = new EventSource('/api/events');
evtSrc.onmessage = e=>{
  const d=JSON.parse(e.data);
  if(d.bets) allBets=d.bets;
  if(d.results) results=d.results;
  refreshAll();
};
</script>
